<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="vinyl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="label" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c23152;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="shine" cx="40%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="url(#bg)" />

  <!-- Subtle top-left shine -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="url(#shine)" />

  <!-- Vinyl record outer circle -->
  <circle cx="512" cy="512" r="370" fill="url(#vinyl)" />

  <!-- Vinyl grooves (concentric rings) -->
  <circle cx="512" cy="512" r="355" fill="none" stroke="#3a3a3a" stroke-width="1.2" />
  <circle cx="512" cy="512" r="340" fill="none" stroke="#333" stroke-width="1" />
  <circle cx="512" cy="512" r="325" fill="none" stroke="#3a3a3a" stroke-width="1.2" />
  <circle cx="512" cy="512" r="310" fill="none" stroke="#333" stroke-width="1" />
  <circle cx="512" cy="512" r="295" fill="none" stroke="#3a3a3a" stroke-width="1.2" />
  <circle cx="512" cy="512" r="280" fill="none" stroke="#333" stroke-width="1" />
  <circle cx="512" cy="512" r="265" fill="none" stroke="#3a3a3a" stroke-width="1.2" />
  <circle cx="512" cy="512" r="250" fill="none" stroke="#333" stroke-width="1" />
  <circle cx="512" cy="512" r="235" fill="none" stroke="#3a3a3a" stroke-width="1" />
  <circle cx="512" cy="512" r="220" fill="none" stroke="#333" stroke-width="1" />
  <circle cx="512" cy="512" r="205" fill="none" stroke="#3a3a3a" stroke-width="1" />
  <circle cx="512" cy="512" r="190" fill="none" stroke="#333" stroke-width="0.8" />

  <!-- Center label -->
  <circle cx="512" cy="512" r="170" fill="url(#label)" />

  <!-- Center label inner ring -->
  <circle cx="512" cy="512" r="155" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" />

  <!-- Musical note on label -->
  <g transform="translate(512, 512)" fill="white" opacity="0.92">
    <!-- Note head 1 -->
    <ellipse cx="-28" cy="18" rx="26" ry="20" transform="rotate(-15 -28 18)" />
    <!-- Note head 2 -->
    <ellipse cx="38" cy="30" rx="26" ry="20" transform="rotate(-15 38 30)" />
    <!-- Stem 1 -->
    <rect x="-7" y="-72" width="6" height="88" rx="3" />
    <!-- Stem 2 -->
    <rect x="59" y="-60" width="6" height="88" rx="3" />
    <!-- Beam -->
    <polygon points="-1,-72 65,-60 65,-44 -1,-56" />
  </g>

  <!-- Center hole -->
  <circle cx="512" cy="512" r="22" fill="#1a1a2e" />

  <!-- Vinyl light reflection arc -->
  <path d="M 330 340 Q 512 210 694 340" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="3" stroke-linecap="round" />
</svg>
